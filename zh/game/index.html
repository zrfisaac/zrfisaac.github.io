    <script>
        const btn = document.getElementById("mobile-menu-btn"), menu = document.getElementById("mobile-menu");
        btn.addEventListener("click", () => { menu.classList.toggle("hidden"); btn.innerHTML = menu.classList.contains("hidden") ? '<i data-lucide="menu" class="h-5 w-5"></i>' : '<i data-lucide="x" class="h-5 w-5"></i>'; lucide.createIcons(); });
        lucide.createIcons();

        <div id="language-switcher" class="fixed bottom-4 right-4 z-[60] text-sm font-semibold">
        <button id="language-toggle" type="button" class="inline-flex items-center gap-2 rounded-lg border border-white/10 bg-[#0d0d10]/95 px-4 py-3 text-white shadow-2xl backdrop-blur transition hover:border-violet-300/60 hover:bg-white/[0.06]" aria-haspopup="true" aria-expanded="false">
            <i data-lucide="languages" class="h-4 w-4 text-violet-300"></i>
            <span id="language-current">Language</span>
            <i data-lucide="chevron-up" class="h-4 w-4"></i>
        </button>
        <div id="language-menu" class="absolute bottom-full right-0 mb-2 hidden min-w-40 overflow-hidden rounded-lg border border-white/10 bg-[#0d0d10]/95 text-zinc-300 shadow-2xl backdrop-blur"></div>
    </div>
    <script>
        (() => {
            const currentLanguage = location.pathname.split("/").filter(Boolean)[0] || "en";
            const pagePath = location.pathname.split("/").filter(Boolean).slice(1).join("/");
            const languages = [
                { code: "pt", label: "Português" },
                { code: "en", label: "English" },
                { code: "es", label: "Español" },
                { code: "zh", label: "中文" }
            ];
            const target = (language) => `/${language}/${pagePath ? `${pagePath}/` : ""}`;
            const toggle = document.getElementById("language-toggle");
            const menu = document.getElementById("language-menu");
            const current = document.getElementById("language-current");
            const activeLanguage = languages.find((language) => language.code === currentLanguage) || languages[1];

            current.textContent = activeLanguage.label;
            menu.innerHTML = languages.map((language) => {
                const active = language.code === currentLanguage;
                return `<a href="${target(language.code)}" onclick="localStorage.setItem('zrf-language','${language.code}')" class="block px-4 py-3 transition ${active ? "bg-purple-500 text-white" : "hover:bg-white/10 hover:text-white"}">${language.label}</a>`;
            }).join("");

            toggle.addEventListener("click", () => {
                const open = menu.classList.toggle("hidden") === false;
                toggle.setAttribute("aria-expanded", String(open));
            });

            document.addEventListener("click", (event) => {
                if (!event.target.closest("#language-switcher")) {
                    menu.classList.add("hidden");
                    toggle.setAttribute("aria-expanded", "false");
                }
            });
            if (window.lucide) {
                window.lucide.createIcons();
            }
        })();
    </script>
