<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRFISAAC | Privacy</title>
    <link rel="shortcut icon" href="/logo.png">
    <script>
        const supported = ["en", "es", "pt", "zh"];
        const aliases = { "pt-br": "pt", "pt-pt": "pt", "es-es": "es", "es-mx": "es", "en-us": "en", "en-gb": "en", "zh-cn": "zh", "zh-sg": "zh", "zh-hans": "zh", "zh-tw": "zh" };
        const saved = localStorage.getItem("zrf-language");
        const browser = (navigator.languages || [navigator.language || "en"]).map((lang) => lang.toLowerCase());
        const language = supported.includes(saved)
            ? saved
            : browser.map((lang) => aliases[lang] || lang.split("-")[0]).find((lang) => supported.includes(lang)) || "en";

        window.location.replace(`/${language}/privacy/`);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
